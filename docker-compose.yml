services:
  spectra-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8081:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      SPECTRA_ALLOWED_HOSTS: "${SPECTRA_ALLOWED_HOSTS:-.ts.net}"
    volumes:
      - .:/app
      - spectra-node-modules:/app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  spectra-node-modules:
